<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>viewbydaryl — Site en maintenance</title>
  <link rel="icon" type="image/png" href="https://ahmedwasef.github.io/viewbydaryl/logo-daryl.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #080808;
      color: #E8E0D0;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      padding: 2rem;
    }

    /* Subtle radial glow */
    body::before {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60vmax;
      height: 60vmax;
      background: radial-gradient(circle, rgba(196,150,90,0.05) 0%, transparent 65%);
      pointer-events: none;
    }

    .wrap {
      text-align: center;
      max-width: 480px;
      width: 100%;
      animation: fadeIn 1.2s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.7rem;
      margin-bottom: 3.5rem;
    }

    .logo-img {
      width: 38px;
      height: 38px;
      filter: brightness(0) invert(1) sepia(1) saturate(4) hue-rotate(3deg) brightness(0.88) drop-shadow(0 0 10px rgba(196,150,90,0.65));
    }

    .logo-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      color: #E8E0D0;
    }

    .logo-text em {
      color: #C4965A;
      font-style: italic;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
    }

    .logo-text strong {
      font-weight: 600;
      letter-spacing: 0.28em;
    }

    /* Divider */
    .divider {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, transparent, rgba(196,150,90,0.4), transparent);
      margin: 0 auto 3rem;
    }

    /* Main label */
    .label {
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #C4965A;
      margin-bottom: 1.2rem;
    }

    /* Heading */
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 7vw, 3.8rem);
      font-weight: 400;
      line-height: 1.1;
      color: #F5F0E8;
      margin-bottom: 1.8rem;
    }

    h1 em {
      color: #C4965A;
      font-style: italic;
    }

    /* Sub text */
    p {
      font-size: 0.82rem;
      font-weight: 300;
      color: #5A5450;
      line-height: 1.8;
      letter-spacing: 0.04em;
      margin-bottom: 3rem;
    }

    /* Contact link */
    .contact {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #C4965A;
      text-decoration: none;
      border-bottom: 1px solid rgba(196,150,90,0.3);
      padding-bottom: 2px;
      transition: color 0.3s, border-color 0.3s;
    }
    .contact:hover {
      color: #E8C88A;
      border-color: rgba(196,150,90,0.7);
    }

    /* Animated dots */
    .dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 3.5rem;
    }
    .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(196,150,90,0.4);
      animation: pulse 1.6s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.25s; }
    .dot:nth-child(3) { animation-delay: 0.5s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.4); background: rgba(196,150,90,0.8); }
    }

    /* Bottom line */
    .bottom {
      position: fixed;
      bottom: 2rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.58rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: #2A2520;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="logo-wrap">
      <img
        class="logo-img"
        src="https://ahmedwasef.github.io/viewbydaryl/logo-daryl.png"
        alt="viewbydaryl"
      />
      <span class="logo-text">
        <span style="font-weight:300">view</span><em> by </em><strong>DARYL</strong>
      </span>
    </div>

    <div class="divider"></div>

    <p class="label">Site en maintenance</p>

    <h1>Nous faisons<br />des <em>changements</em></h1>

    <p>
      Le site sera de retour très bientôt.<br />
      Merci pour votre patience.
    </p>

    <a class="contact" href="mailto:vbdaryl17@viewbydaryl.com">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
      Nous contacter
    </a>

    <div class="dots">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </div>

  <p class="bottom">© 2026 DORILAS Daryl — Photographe · Montréal</p>

</body>
</html>
